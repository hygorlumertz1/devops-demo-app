name: devops-demo

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: devops-demo-app:local
    container_name: devops-demo-app
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "project=devops-demo"
      - "environment=local"
