server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/html text/css application/javascript text/plain;
    gzip_min_length 1024;

    # Cache para assets estáticos
    location ~* \.(css|js|ico|png|jpg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fallback SPA — redireciona qualquer rota para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Endpoint de health check (usado pelo Docker HEALTHCHECK)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
