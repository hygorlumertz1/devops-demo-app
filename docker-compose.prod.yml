name: devops-demo-prod

# Uso: docker compose -f docker-compose.prod.yml up -d
# Requer variável de ambiente: IMAGE_TAG (ex: sha-abc1234 ou latest)

services:
  app:
    image: ghcr.io/hygorlumertz1/devops-demo-app:${IMAGE_TAG:-latest}
    container_name: devops-demo-prod
    ports:
      - "80:8080"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "project=devops-demo"
      - "environment=production"
